<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - D-Box</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container login-container">
    <h1 class="title">Signing in to <span class="gradient-text">D-Box</span></h1>

    <div class="login-card">
      <!-- Fixed: Real Backend Login Route -->
      <form id="loginForm" action="/api/auth/login" method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn primary">Sign In</button>
      </form>

      <!-- Divider -->
      <div class="login-divider">
        <span>or</span>
      </div>

      <!-- Google Buttom -->
       <a href="/api/auth/google" class="social-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google Logo" class="social-icon">
          Continue with Google 
      </a>

      <p class="muted">Don't have an account? <a href="signup.html">Sign up</a></p>
      
    </div>
  </div>

<script>
  async function redirectIfLoggedIn() {
    try {
      const res = await fetch('/api/auth/session', {
        credentials: 'same-origin'
      });
      const data = await res.json();

      if (data.authenticated) {
        window.location.replace('/home');
      }
    } catch (error) {
      console.error('Session check failed:', error);
    }
  }

  redirectIfLoggedIn();
  window.addEventListener('pageshow', redirectIfLoggedIn);
  window.addEventListener('focus', redirectIfLoggedIn);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      redirectIfLoggedIn();
    }
  });

  document.getElementById('loginForm').addEventListener('submit', async function (e){
    e.preventDefault(); // Prevent page reload

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try{
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      let data = {};
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        data = await res.json();
      } else {
        const text = await res.text();
        data = { message: text || 'Unexpected server response' };
      }

      if (!res.ok){
        alert(data.message || `Invalid login`);
        return; //wrong: stay on login page
      }

      // Notify other tabs/pages that auth state changed.
      localStorage.setItem('authState', `logged-in:${Date.now()}`);

      //Redirect after login
      window.location.replace(data.redirectUrl || '/home');
    } catch (error) {
      console.error('Login failed:', error);
      alert(`server error: could not login`);
    }
  });
</script>
</body>
</html>
