<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - D-Box</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .forgot-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
    }

    .forgot-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid rgba(128, 82, 255, 0.906);
      padding: 40px;
      border-radius: 12px;
      width: 500px;
      box-shadow: 0 8px 30px rgba(208, 16, 242, 0);
    }

    .forgot-card h2 {
      margin: 0 0 10px 0;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #00e6ff, #7b2ff7);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .forgot-card p {
      color: #aaa;
      margin: 0 0 24px 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .forgot-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.9rem;
      text-align: left;
      color: #cfeeff;
    }

    .form-group input {
      padding: 10px 12px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid rgba(196, 28, 238, 0.459);
      background: rgba(131, 17, 231, 0.055);
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      box-shadow: 0 0 12px rgba(47,200,247,0.12);
      border-color: rgba(15, 140, 242, 0.906);
    }

    .btn-submit {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #dc0d9e, #7b2ff7);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(123,47,247,0.6);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: scale(1);
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #00e6ff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: #7b2ff7;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="forgot-container">
    <div class="forgot-card">
      <h2>Reset Password</h2>
      <p>Enter your email address and we'll send you a code to reset your password.</p>

      <div id="message" class="message"></div>

      <form class="forgot-form" id="forgotForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            required
          >
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Send Reset Code
        </button>
      </form>

      <div class="back-link">
        <a href="login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageDiv.textContent = '';
      messageDiv.className = 'message';

      const email = emailInput.value.trim().toLowerCase();

      if (!email) {
        showMessage('Please enter your email address', 'error');
        return;
      }

      if (!email.includes('@')) {
        showMessage('Please enter a valid email address', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Sending...';

      try {
        const res = await fetch('/api/password-reset/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Failed to send reset code', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Reset Code';
          return;
        }

        showMessage('Reset code sent! Check your email.', 'success');
        
        setTimeout(() => {
          window.location.href = `verify-otp.html?email=${encodeURIComponent(email)}`;
        }, 1500);

      } catch (err) {
        console.error('Error:', err);
        showMessage('Network error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Code';
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
    }
  </script>
</body>
</html>
