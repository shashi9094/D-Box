<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - D-Box</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .reset-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
    }

    .reset-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid rgba(128, 82, 255, 0.906);
      padding: 40px;
      border-radius: 12px;
      width: 500px;
      box-shadow: 0 8px 30px rgba(208, 16, 242, 0);
    }

    .reset-card h2 {
      margin: 0 0 10px 0;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #00e6ff, #7b2ff7);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .reset-card p {
      color: #aaa;
      margin: 0 0 24px 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .form-group label {
      font-size: 0.9rem;
      text-align: left;
      color: #cfeeff;
    }

    .form-group input {
      padding: 10px 12px;
      padding-right: 40px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid rgba(196, 28, 238, 0.459);
      background: rgba(131, 17, 231, 0.055);
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      box-shadow: 0 0 12px rgba(47,200,247,0.12);
      border-color: rgba(15, 140, 242, 0.906);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 33px;
      background: none;
      border: none;
      color: #00e6ff;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #7b2ff7;
    }

    .password-strength {
      margin-top: 4px;
      font-size: 0.8rem;
      display: flex;
      gap: 4px;
    }

    .strength-bar {
      height: 3px;
      width: 20%;
      background: #666;
      border-radius: 2px;
    }

    .strength-bar.weak { background: #ef4444; }
    .strength-bar.medium { background: #eab308; }
    .strength-bar.strong { background: #22c55e; }

    .btn-submit {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #dc0d9e, #7b2ff7);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(123,47,247,0.6);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: scale(1);
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #00e6ff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: #7b2ff7;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .requirements {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .requirement {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }

    .requirement-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }

    .requirement.met .requirement-check {
      background: rgba(34, 197, 94, 0.3);
      color: #22c55e;
    }

    .requirement.met {
      color: #22c55e;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-card">
      <h2>Create New Password</h2>
      <p>Enter a new password for your D-Box account.</p>

      <div id="message" class="message"></div>

      <div class="requirements">
        <div class="requirement" id="req-length">
          <div class="requirement-check">○</div>
          <span>At least 8 characters</span>
        </div>
        <div class="requirement" id="req-uppercase">
          <div class="requirement-check">○</div>
          <span>One uppercase letter</span>
        </div>
        <div class="requirement" id="req-lowercase">
          <div class="requirement-check">○</div>
          <span>One lowercase letter</span>
        </div>
        <div class="requirement" id="req-number">
          <div class="requirement-check">○</div>
          <span>One number</span>
        </div>
      </div>

      <form class="reset-form" id="resetForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter new password"
            required
          >
          <button type="button" class="toggle-password" data-target="password">👁️</button>
          <div class="password-strength" id="strengthBars"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            required
          >
          <button type="button" class="toggle-password" data-target="confirmPassword">👁️</button>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Update Password
        </button>
      </form>

      <div class="back-link">
        <a href="login.html">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('resetForm');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');
    const strengthBars = document.getElementById('strengthBars');

    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    const token = params.get('token');

    if (!email || !token) {
      window.location.href = 'forgot-password.html';
    }

    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = btn.dataset.target;
        const input = document.getElementById(targetId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.textContent = isPassword ? '🙈' : '👁️';
      });
    });

    // Password strength checker
    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      updateRequirements(password);
      updateStrengthBars(password);
    });

    function updateRequirements(password) {
      const length = password.length >= 8;
      const uppercase = /[A-Z]/.test(password);
      const lowercase = /[a-z]/.test(password);
      const number = /[0-9]/.test(password);

      document.getElementById('req-length').classList.toggle('met', length);
      document.getElementById('req-uppercase').classList.toggle('met', uppercase);
      document.getElementById('req-lowercase').classList.toggle('met', lowercase);
      document.getElementById('req-number').classList.toggle('met', number);
    }

    function updateStrengthBars(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[a-z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^A-Za-z0-9]/.test(password)) strength++;

      strengthBars.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const bar = document.createElement('div');
        bar.className = 'strength-bar';
        if (i < strength) {
          if (strength <= 2) bar.classList.add('weak');
          else if (strength <= 3) bar.classList.add('medium');
          else bar.classList.add('strong');
        }
        strengthBars.appendChild(bar);
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageDiv.textContent = '';
      messageDiv.className = 'message';

      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (!password || !confirmPassword) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters', 'error');
        return;
      }

      if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password)) {
        showMessage('Password must include uppercase, lowercase, and numbers', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Updating...';

      try {
        const res = await fetch('/api/password-reset/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, token, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Failed to update password', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
          return;
        }

        showMessage('Password updated successfully! Redirecting...', 'success');
        
        setTimeout(() => {
          window.location.href = 'login.html?message=password-reset-success';
        }, 1500);

      } catch (err) {
        console.error('Error:', err);
        showMessage('Network error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
    }
  </script>
</body>
</html>
