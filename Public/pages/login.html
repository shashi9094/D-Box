<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - D-Box</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container login-container">
    <h1 class="title">Signing in to <span class="gradient-text">D-Box</span></h1>

    <div class="login-card">
      <p id="googleNotice" class="muted" hidden></p>
      <p id="sessionNotice" class="muted" hidden></p>
      <p id="inviteNotice" class="muted" hidden></p>

      <!-- Fixed: Real Backend Login Route -->
      <form id="loginForm" action="/api/auth/login" method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn primary">Sign In</button>
      </form>

      <!-- Divider -->
      <div class="login-divider">
        <span>or</span>
      </div>

      <!-- Google Buttom -->
       <a href="/api/auth/google" class="social-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Google Logo" class="social-icon">
          Continue with Google 
      </a>

      <p class="muted">Don't have an account? <a id="signupLink" href="signup.html">Sign up</a></p>
      
    </div>
  </div>

<script>
  const inviteParams = new URLSearchParams(window.location.search);
  const inviteEmail = String(inviteParams.get('email') || '').trim();
  const inviteEmailNormalized = inviteEmail.toLowerCase();
  const inviteBoxId = Number(inviteParams.get('invite'));
  const inviteToken = String(inviteParams.get('token') || '').trim();
  let inviteAccountExists = null;

  function buildInviteUrl(pageName) {
    const params = new URLSearchParams();

    if (Number.isFinite(inviteBoxId) && inviteBoxId > 0) {
      params.set('invite', String(inviteBoxId));
    }

    if (inviteEmail) {
      params.set('email', inviteEmail);
    }

    if (inviteToken) {
      params.set('token', inviteToken);
    }

    const query = params.toString();
    return query ? `${pageName}?${query}` : pageName;
  }

  function getInviteSignupUrl() {
    return buildInviteUrl('signup.html');
  }

  function getInviteLoginUrl() {
    return buildInviteUrl('login.html');
  }

  function normalizeEmail(value) {
    return String(value || '').trim().toLowerCase();
  }

  function showInviteNotice() {
    const inviteNotice = document.getElementById('inviteNotice');
    if (!inviteEmail && !(Number.isFinite(inviteBoxId) && inviteBoxId > 0)) {
      return;
    }

    if (inviteEmail) {
      const emailInput = document.getElementById('email');
      emailInput.value = inviteEmail;
      emailInput.readOnly = true;
      emailInput.title = 'Invite email locked for joining shared box';
    }

    if (inviteAccountExists === false) {
      inviteNotice.textContent = 'No account found for this invited email. Please create an account first.';
    } else {
      inviteNotice.textContent = 'Invite link detected. Sign in with this invited email to join the shared group instantly.';
    }

    inviteNotice.hidden = false;
  }

  async function fetchInviteAccountExists() {
    if (!inviteEmail) {
      inviteAccountExists = null;
      return null;
    }

    if (inviteAccountExists !== null) {
      return inviteAccountExists;
    }

    try {
      const res = await fetch(`/api/auth/account-exists?email=${encodeURIComponent(inviteEmail)}`, {
        credentials: 'same-origin'
      });

      const data = await res.json().catch(() => ({}));
      inviteAccountExists = Boolean(data.exists);
      return inviteAccountExists;
    } catch (error) {
      console.error('Invite account check failed:', error);
      return null;
    }
  }

  function syncInviteLinks() {
    const signupLink = document.getElementById('signupLink');
    signupLink.href = getInviteSignupUrl();
  }

  async function logoutCurrentUserAndRedirect(targetUrl) {
    try {
      await fetch('/api/auth/logout', {
        method: 'POST',
        credentials: 'same-origin'
      });
    } catch (error) {
      console.error('Invite logout failed:', error);
    }

    try {
      localStorage.removeItem('authState');
    } catch (error) {
      console.error('Unable to clear auth state marker:', error);
    }

    window.location.replace(targetUrl);
  }

  async function consumeInviteForLoggedInUser() {
    if (!(Number.isFinite(inviteBoxId) && inviteBoxId > 0)) {
      window.location.replace('/home');
      return;
    }

    try {
      const res = await fetch('/api/auth/accept-invite', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          inviteBoxId,
          inviteEmail: inviteEmail || null,
          inviteToken: inviteToken || null
        })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.message || 'Unable to process invite');
      }

      window.location.replace(data.redirectUrl || `/uploads?boxId=${inviteBoxId}`);
    } catch (error) {
      alert(error.message || 'Unable to process invite. Please login again with invited account.');
      window.location.replace('/home');
    }
  }

  async function bootstrapInviteFlow() {
    const accountExists = await fetchInviteAccountExists();
    syncInviteLinks();
    showInviteNotice();

    try {
      const res = await fetch('/api/auth/session', {
        credentials: 'same-origin'
      });
      const data = await res.json().catch(() => ({}));

      if (data.authenticated) {
        const sessionEmail = normalizeEmail(data?.user?.email);

        if (inviteEmailNormalized && sessionEmail && sessionEmail !== inviteEmailNormalized) {
          const targetUrl = accountExists === false ? getInviteSignupUrl() : getInviteLoginUrl();
          await logoutCurrentUserAndRedirect(targetUrl);
          return;
        }

        if (Number.isFinite(inviteBoxId) && inviteBoxId > 0) {
          await consumeInviteForLoggedInUser();
          return;
        }

        window.location.replace('/home');
        return;
      }

      if (inviteEmail && accountExists === false) {
        window.location.replace(getInviteSignupUrl());
      }
    } catch (error) {
      console.error('Session check failed:', error);
    }
  }

  function showGoogleDisabledNotice() {
    const params = new URLSearchParams(window.location.search);
    const googleNotice = document.getElementById('googleNotice');

    if (params.get('google') === 'disabled') {
      googleNotice.textContent = 'Google login is not configured on this deployment. Use email and password to sign in.';
      googleNotice.hidden = false;
    }
  }

  function showGoogleErrorNotice() {
    const params = new URLSearchParams(window.location.search);
    const googleNotice = document.getElementById('googleNotice');
    const g = params.get('google');
    const reason = params.get('reason') || '';

    if (!g) return;

    if (g === 'failed') {
      googleNotice.textContent = 'Google login failed. Please try again or use email/password.';
      googleNotice.hidden = false;
      return;
    }

    if (g === 'error') {
      let message = 'Google login encountered an error.';
      if (reason === 'invalid-client-secret') {
        message = 'Google login is misconfigured: invalid client secret. Contact the site administrator.';
      } else if (reason) {
        message = `Google login error: ${decodeURIComponent(reason)}`;
      }

      googleNotice.textContent = message;
      googleNotice.hidden = false;
    }
  }

  function showSessionExpiredNotice() {
    const params = new URLSearchParams(window.location.search);
    const sessionNotice = document.getElementById('sessionNotice');

    if (params.get('reason') === 'session-expired') {
      sessionNotice.textContent = 'Session expired, please login again.';
      sessionNotice.hidden = false;
    }
  }

  bootstrapInviteFlow();
  showGoogleDisabledNotice();
  showGoogleErrorNotice();
  showSessionExpiredNotice();
  showInviteNotice();

  document.getElementById('loginForm').addEventListener('submit', async function (e){
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email,
          password,
          inviteBoxId: Number.isFinite(inviteBoxId) && inviteBoxId > 0 ? inviteBoxId : null,
          inviteToken: inviteToken || null
        })
      });

      let data = {};
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        data = await res.json();
      } else {
        const text = await res.text();
        data = { message: text || 'Unexpected server response' };
      }

      if (!res.ok) {
        if (data.message === 'User not found' && inviteEmail) {
          alert('No account found for this invite email. Please sign up first.');
        } else {
          alert(data.message || 'Invalid login');
        }
        return;
      }

      try {
        localStorage.setItem('authState', `logged-in:${Date.now()}`);
      } catch (error) {
        console.error('Unable to record auth state marker:', error);
      }

      window.location.replace(data.redirectUrl || '/home');
    } catch (error) {
      console.error('Login failed:', error);
      alert('server error: could not login');
    }
  });
</script>
</body>
</html>
