<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - D-Box</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .verify-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 100vh;
    }

    .verify-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid rgba(128, 82, 255, 0.906);
      padding: 40px;
      border-radius: 12px;
      width: 500px;
      box-shadow: 0 8px 30px rgba(208, 16, 242, 0);
    }

    .verify-card h2 {
      margin: 0 0 10px 0;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #00e6ff, #7b2ff7);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .verify-card p {
      color: #aaa;
      margin: 0 0 24px 0;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .verify-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.9rem;
      text-align: left;
      color: #cfeeff;
    }

    .form-group input {
      padding: 10px 12px;
      font-size: 1.2rem;
      border-radius: 8px;
      border: 1px solid rgba(196, 28, 238, 0.459);
      background: rgba(131, 17, 231, 0.055);
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
      text-align: center;
      letter-spacing: 8px;
      font-weight: 600;
    }

    .form-group input:focus {
      box-shadow: 0 0 12px rgba(47,200,247,0.12);
      border-color: rgba(15, 140, 242, 0.906);
    }

    .btn-submit {
      padding: 12px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #dc0d9e, #7b2ff7);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(123,47,247,0.6);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: scale(1);
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #00e6ff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: #7b2ff7;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .resend-section {
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .resend-text {
      font-size: 0.85rem;
      color: #888;
      margin: 0;
    }

    .resend-btn {
      background: none;
      border: none;
      color: #00e6ff;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 4px 0;
      margin-top: 8px;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .resend-btn:hover {
      color: #7b2ff7;
    }

    .resend-btn:disabled {
      color: #666;
      cursor: not-allowed;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="verify-container">
    <div class="verify-card">
      <h2>Verify Code</h2>
      <p>Enter the 6-digit code we sent to your email. It expires in 10 minutes.</p>

      <div id="message" class="message"></div>

      <form class="verify-form" id="verifyForm">
        <div class="form-group">
          <label for="otp">Verification Code</label>
          <input
            type="text"
            id="otp"
            name="otp"
            placeholder="000000"
            maxlength="6"
            pattern="[0-9]{6}"
            required
          >
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Verify Code
        </button>
      </form>

      <div class="resend-section">
        <p class="resend-text">Didn't receive the code?</p>
        <button type="button" class="resend-btn" id="resendBtn">
          Resend Code
        </button>
      </div>

      <div class="back-link">
        <a href="forgot-password.html">← Change Email</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('verifyForm');
    const otpInput = document.getElementById('otp');
    const submitBtn = document.getElementById('submitBtn');
    const resendBtn = document.getElementById('resendBtn');
    const messageDiv = document.getElementById('message');

    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');

    if (!email) {
      window.location.href = 'forgot-password.html';
    }

    // Only allow numeric input
    otpInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageDiv.textContent = '';
      messageDiv.className = 'message';

      const otp = otpInput.value.trim();

      if (!otp || otp.length !== 6) {
        showMessage('Please enter a valid 6-digit code', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Verifying...';

      try {
        const res = await fetch('/api/password-reset/verify-reset-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Invalid code', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Verify Code';
          return;
        }

        showMessage('Code verified! Redirecting...', 'success');
        
        setTimeout(() => {
          window.location.href = `reset-password.html?email=${encodeURIComponent(email)}&token=${data.token}`;
        }, 1000);

      } catch (err) {
        console.error('Error:', err);
        showMessage('Network error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Verify Code';
      }
    });

    resendBtn.addEventListener('click', async () => {
      messageDiv.textContent = '';
      messageDiv.className = 'message';
      resendBtn.disabled = true;

      try {
        const res = await fetch('/api/password-reset/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.error || 'Failed to resend code', 'error');
          resendBtn.disabled = false;
          return;
        }

        showMessage('New code sent! Check your email.', 'success');
        
        setTimeout(() => {
          resendBtn.disabled = false;
        }, 3000);

      } catch (err) {
        console.error('Error:', err);
        showMessage('Network error. Please try again.', 'error');
        resendBtn.disabled = false;
      }
    });

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
    }
  </script>
</body>
</html>
