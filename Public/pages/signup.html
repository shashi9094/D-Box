<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign up - D-Box</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="allow-scroll">
  <div class="container login-container">
    <h1 class="title">Signing up to <span class="gradient-text">D-Box</span></h1>

    <div class="login-card">
      <p id="inviteNotice" class="muted" hidden></p>

      <form id="signupForm">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" name="fullName" required>

        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="country">Country</label>
        <select id="country" name="country" required>
          <!-- Top 20 countries + Other -->
          <option value="">Select country</option>
          <option>India</option>
          <option>United States</option>
          <option>China</option>
          <option>Japan</option>
          <option>Germany</option>
          <option>United Kingdom</option>
          <option>France</option>
          <option>Italy</option>
          <option>Canada</option>
          <option>Brazil</option>
          <option>Russia</option>
          <option>South Korea</option>
          <option>Australia</option>
          <option>Spain</option>
          <option>Mexico</option>
          <option>Indonesia</option>
          <option>Turkey</option>
          <option>Netherlands</option>
          <option>Saudi Arabia</option>
          <option>Switzerland</option>
          <option>Other</option>
        </select>

        <label for="capacity">User capacity</label>
        <select id="capacity" name="capacity" required>
          <option value="">--Select--</option>
          <option>Solo</option>
          <option>Informal groups</option>
          <option>Formal groups</option>
        </select>

        <label for="purpose">Purpose of use</label>
        <select id="purpose" name="purpose" required>
          <option value="">--Select--</option>
          <option>Personal - Notes/Data Management</option>
          <option>Maintaining Research groups</option>
          <option>Maintaining Professor-Student groups</option>
          <option>Maintaining Professional groups</option>
          <option>Other</option>
        </select>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="6" required>

        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" minlength="6" required>

        <button type="submit" class="btn primary">Create account</button>
      </form>

      <p class="muted">Already have an account? <a id="signinLink" href="login.html">Sign in</a></p>
    </div>
  </div>

  <script>
    const inviteParams = new URLSearchParams(window.location.search);
    const inviteEmail = String(inviteParams.get('email') || '').trim();
    const inviteEmailNormalized = inviteEmail.toLowerCase();
    const inviteBoxId = Number(inviteParams.get('invite'));
    const inviteToken = String(inviteParams.get('token') || '').trim();
    let inviteAccountExists = null;

    function buildInviteUrl(pageName) {
      const params = new URLSearchParams();

      if (Number.isFinite(inviteBoxId) && inviteBoxId > 0) {
        params.set('invite', String(inviteBoxId));
      }

      if (inviteEmail) {
        params.set('email', inviteEmail);
      }

      if (inviteToken) {
        params.set('token', inviteToken);
      }

      const query = params.toString();
      return query ? `${pageName}?${query}` : pageName;
    }

    function getInviteSignupUrl() {
      return buildInviteUrl('signup.html');
    }

    function getInviteLoginUrl() {
      return buildInviteUrl('login.html');
    }

    function normalizeEmail(value) {
      return String(value || '').trim().toLowerCase();
    }

    function syncInviteUi() {
      const inviteNotice = document.getElementById('inviteNotice');

      if (!inviteEmail && !(Number.isFinite(inviteBoxId) && inviteBoxId > 0)) {
        return;
      }

      if (inviteEmail) {
        const emailInput = document.getElementById('email');
        emailInput.value = inviteEmail;
        emailInput.readOnly = true;
        emailInput.title = 'Invite email locked for joining shared box';
      }

      if (inviteAccountExists === false) {
        inviteNotice.textContent = Number.isFinite(inviteBoxId) && inviteBoxId > 0
          ? `No account found for ${inviteEmail}. Create this account to auto-join the shared group.`
          : `You were invited as ${inviteEmail}. Sign up with this email to auto-join the shared group.`;
      } else {
        inviteNotice.textContent = Number.isFinite(inviteBoxId) && inviteBoxId > 0
          ? `Invite detected for ${inviteEmail}. Create this account to auto-join the shared group.`
          : `You were invited as ${inviteEmail}. Sign up with this email to auto-join the shared group.`;
      }

      inviteNotice.hidden = false;

      const signInLink = document.getElementById('signinLink');
      signInLink.href = getInviteLoginUrl();
    }

    async function fetchInviteAccountExists() {
      if (!inviteEmail) {
        inviteAccountExists = null;
        return null;
      }

      if (inviteAccountExists !== null) {
        return inviteAccountExists;
      }

      try {
        const res = await fetch(`/api/auth/account-exists?email=${encodeURIComponent(inviteEmail)}`, {
          credentials: 'same-origin'
        });

        const data = await res.json().catch(() => ({}));
        inviteAccountExists = Boolean(data.exists);
        return inviteAccountExists;
      } catch (error) {
        console.error('Invite account check failed:', error);
        return null;
      }
    }

    async function logoutCurrentUserAndRedirect(targetUrl) {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          credentials: 'same-origin'
        });
      } catch (error) {
        console.error('Invite logout failed:', error);
      }

      try {
        localStorage.removeItem('authState');
      } catch (error) {
        console.error('Unable to clear auth state marker:', error);
      }

      window.location.replace(targetUrl);
    }

    async function consumeInviteForLoggedInUser() {
      if (!(Number.isFinite(inviteBoxId) && inviteBoxId > 0)) {
        window.location.replace('/home');
        return;
      }

      const consumeRes = await fetch('/api/auth/accept-invite', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          inviteBoxId,
          inviteEmail: inviteEmail || null,
          inviteToken: inviteToken || null
        })
      });

      const consumeData = await consumeRes.json().catch(() => ({}));
      if (!consumeRes.ok) {
        throw new Error(consumeData.message || 'Unable to process invite');
      }

      window.location.replace(consumeData.redirectUrl || '/dashboard');
    }

    async function bootstrapInviteFlow() {
      const accountExists = await fetchInviteAccountExists();
      syncInviteUi();

      try {
        const sessionRes = await fetch('/api/auth/session', {
          credentials: 'same-origin'
        });
        const sessionData = await sessionRes.json().catch(() => ({}));

        if (!sessionData.authenticated) {
          if (inviteEmail && accountExists === false) {
            // Stay on signup and let the invite email prefill drive the form.
            return;
          }

          return;
        }

        const sessionEmail = normalizeEmail(sessionData?.user?.email);
        if (inviteEmailNormalized && sessionEmail && sessionEmail !== inviteEmailNormalized) {
          const targetUrl = accountExists === false ? getInviteSignupUrl() : getInviteLoginUrl();
          await logoutCurrentUserAndRedirect(targetUrl);
          return;
        }

        if (Number.isFinite(inviteBoxId) && inviteBoxId > 0) {
          await consumeInviteForLoggedInUser();
          return;
        }

        window.location.replace('/home');
      } catch (error) {
        console.error('Invite consume failed:', error);
      }
    }

    bootstrapInviteFlow();

    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const submitButton = this.querySelector('button[type="submit"]');
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      const data = {
        fullname: document.getElementById("fullName").value,
        dob: document.getElementById("dob").value,
        email: document.getElementById("email").value,
        country: document.getElementById("country").value,
        capacity: document.getElementById("capacity").value,
        purpose: document.getElementById("purpose").value,
        password: password,
        inviteBoxId: Number.isFinite(inviteBoxId) && inviteBoxId > 0 ? inviteBoxId : null,
        inviteToken: inviteToken || null
      };

      try {
        submitButton.disabled = true;

        const response = await fetch("/api/auth/signup", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await response.json().catch(() => ({}));
        console.log('signup response:', { status: response.status, ok: response.ok, result });

        if (!response.ok) {
          alert(result.message || "Signup failed");
          return;
        }

        try {
          const sessionRes = await fetch('/api/auth/session', {
            credentials: 'include',
            cache: 'no-store'
          });
          const sessionData = await sessionRes.json().catch(() => ({}));
          console.log('signup session check:', { status: sessionRes.status, sessionData });
        } catch (sessionErr) {
          console.warn('Session confirmation after signup failed:', sessionErr);
        }

        window.location.href = result.redirectUrl || "/complete-profile";

      } catch (err) {
        console.error('Signup submit failed:', err);
        alert("Server error!");
      } finally {
        submitButton.disabled = false;
      }
    });

  </script>
</body>
</html>
