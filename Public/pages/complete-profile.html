<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Profile - D-Box</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="allow-scroll">
  <div class="container login-container">
    <h1 class="title">Complete your <span class="gradient-text">D-Box</span> profile</h1>

    <div class="login-card">
      <div id="loadingState" class="muted" style="display:flex;align-items:center;gap:12px;min-height:56px;">
        <span style="width:18px;height:18px;border:2px solid rgba(255,255,255,.25);border-top-color:#00ffd5;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
        <span id="loadingMessage">Checking your session...</span>
      </div>

      <p id="profileError" class="muted" hidden style="color:#ff8ca1;"></p>
      <p class="muted" id="formHelp" hidden>Finish the missing profile fields to continue.</p>

      <form id="completeProfileForm" hidden>
        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob" required>

        <label for="country">Country</label>
        <select id="country" name="country" required>
          <option value="">--Select--</option>
          <option value="India">India</option>
          <option value="USA">USA</option>
          <option value="UK">UK</option>
          <option value="Canada">Canada</option>
          <option value="Australia">Australia</option>
          <option value="Other">Other</option>
        </select>

        <label for="capacity">User capacity</label>
        <select id="capacity" name="capacity" required>
          <option value="">--Select--</option>
          <option>Solo</option>
          <option>Informal groups</option>
          <option>Formal groups</option>
        </select>

        <label for="purpose">Purpose of use</label>
        <select id="purpose" name="purpose" required>
          <option value="">--Select--</option>
          <option>Personal - Notes/Data Management</option>
          <option>Maintaining Research groups</option>
          <option>Maintaining Professor-Student groups</option>
          <option>Maintaining Professional groups</option>
          <option>Other</option>
        </select>

        <button type="submit" class="btn primary">Save and continue</button>
      </form>
    </div>
  </div>

  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <script>
    const loadingState = document.getElementById('loadingState');
    const loadingMessage = document.getElementById('loadingMessage');
    const profileError = document.getElementById('profileError');
    const profileForm = document.getElementById('completeProfileForm');
    const formHelp = document.getElementById('formHelp');
    const submitButton = profileForm.querySelector('button[type="submit"]');

    let authReady = false;

    function setLoading(isLoading, message) {
      loadingState.hidden = !isLoading;
      if (message) {
        loadingMessage.textContent = message;
      }
      profileForm.hidden = isLoading;
      formHelp.hidden = isLoading;
      submitButton.disabled = isLoading;
      profileForm.setAttribute('aria-busy', String(isLoading));
    }

    function showError(message) {
      profileError.textContent = message;
      profileError.hidden = false;
    }

    async function ensureStillAuthenticated() {
      try {
        const response = await fetch('/api/auth/session', {
          credentials: 'same-origin',
          cache: 'no-store'
        });

        if (!response.ok) {
          console.warn('complete-profile session check failed:', response.status);
          return null;
        }

        const data = await response.json();
        console.log('complete-profile session state:', data);
        if (!data.authenticated) {
          return null;
        }

        return data;
      } catch (error) {
        console.error('complete-profile auth init failed:', error);
        return null;
      }
    }

    async function initializePage() {
      setLoading(true, 'Checking your session...');

      const session = await ensureStillAuthenticated();
      if (!session) {
        window.location.replace('/login.html?reason=session-expired');
        return;
      }

      authReady = true;
      profileError.hidden = true;
      formHelp.hidden = false;
      setLoading(false);
      profileForm.hidden = false;
    }

    // Keep submit disabled until form is valid
    function updateSubmitState() {
      const isValid = profileForm.checkValidity();
      submitButton.disabled = !isValid || !authReady;
    }

    ['change', 'input'].forEach((ev) => {
      profileForm.addEventListener(ev, updateSubmitState);
    });

    document.getElementById('completeProfileForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!authReady) {
        showError('Session is still initializing. Please wait a moment and try again.');
        return;
      }

      setLoading(true, 'Saving your profile...');

      const dob = document.getElementById('dob').value;
      const country = document.getElementById('country').value;
      const capacity = document.getElementById('capacity').value;
      const purpose = document.getElementById('purpose').value;

      try {
        const response = await fetch('/api/complete-profile', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ dob, country, capacity, purpose })
        });

        const result = await response.json().catch(() => ({}));

        console.log('complete-profile response:', {
          status: response.status,
          ok: response.ok,
          result,
        });

        if (!response.ok) {
          if (response.status === 401) {
            window.location.replace('/login.html?reason=session-expired');
            return;
          }

          // Show friendly inline error messages instead of alerts or forced refreshes.
          const msg = result && result.message ? result.message : 'Unable to complete profile';
          showError(msg);
          return;
        }

        // Wait for server confirmation then redirect to the dashboard
        window.location.replace(result.redirectUrl || '/dashboard');
      } catch (error) {
        console.error('complete-profile save failed:', error);
        showError(error.message || 'Unable to save profile');
      } finally {
        setLoading(false);
      }
    });

    initializePage();
  </script>
</body>
</html>
