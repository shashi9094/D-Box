<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exist Box</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <script src="/scripts/auth-guard.js" defer></script>
        <script src="/scripts/back-nav.js" defer></script>
</head>

<body class="dashboard-page">

<div class="main-layout">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <h3>D-Box</h3>
        <ul>
            <li id="menuHome">Home</li>
            <li id="menudashboard">Dashboard</li>
            <li id="newMenu">New Box</li>
            <li id="menuSettings">Settings</li>
        </ul>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="exist-box-container" id="existingSection">
        <!-- <h2 class="section-title">Old Boxes</h2> -->

        <div class="box-list">

            <div class="exist-box-card">
                <div class="box-content">
                </div>
            </div>

        </div>
</div>

<div class="button-group" aria-label="Quick actions">
    <button type="button" class="add-box-btn" id="newBoxCornerBtn" aria-label="Create New Box" title="Create New Box">
        <i class="fa-solid fa-plus"></i>
    </button>
</div>

<div class="dashboard-modal" id="dashboardModal" aria-hidden="true">
    <div class="dashboard-modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="dashboard-modal-header">
            <h3 id="modalTitle">Manage Box</h3>
            <button type="button" class="modal-close-btn" id="modalCloseBtn" aria-label="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <form id="addMemberForm" class="modal-form" hidden>
            <input type="hidden" id="addMemberBoxId">
            <label for="memberEmailInput">User Email(s)</label>
            <input id="memberEmailInput" type="text" placeholder="user1@example.com, user2@example.com" required>
            <small class="modal-help-text">You can add multiple email addresses, separated by commas or line breaks.</small>
            <button type="submit" class="modal-submit-btn">
                <i class="fa-solid fa-user-plus"></i> Add User
            </button>
        </form>

        <form id="removeMemberForm" class="modal-form" hidden>
            <input type="hidden" id="removeMemberBoxId">
            <label for="removeMemberSelect">Select User</label>
            <select id="removeMemberSelect" required></select>
            <button type="submit" class="modal-submit-btn danger">
                <i class="fa-solid fa-user-minus"></i> Revoke User
            </button>
        </form>

        <p class="modal-error" id="modalErrorText"></p>
    </div>
</div>

<script>
let boxes = [];
let selectedBoxId = null;
let selectedBoxRole = null;
let reqUserId = null;
const CAPACITY_MIN = 1;
const CAPACITY_MAX = 200;

async function apiRequest(url, options = {}) {
    const res = await fetch(url, {
        credentials: 'same-origin',
        ...options
    });

    const payload = await res.json().catch(() => ({}));
    if (!res.ok) {
        throw new Error(payload.message || payload.error || 'Request failed');
    }

    return payload;
}

async function loadBoxes() {
    const response = await apiRequest('/api/box/my-boxes');
    boxes = response.data || [];

    if (!boxes.length) {
        selectedBoxId = null;
        selectedBoxRole = null;
        await render();
        return;
    }

    if (!selectedBoxId) {
        selectedBoxId = boxes[0].id;
    }

    const selectedBox = boxes.find((b) => b.id === selectedBoxId) || boxes[0];
    selectedBoxId = selectedBox.id;
    selectedBoxRole = selectedBox.role;
    await render();
}

async function loadMembers(boxId) {
    const response = await apiRequest(`/api/box/${boxId}/members`);
    return response.data || [];
}

async function loadContents(boxId) {
    const response = await apiRequest(`/api/box/${boxId}/content`);
    return response.data || [];
}

function renderEmptyState(list) {
    const card = document.createElement('div');
    card.className = 'exist-box-card';
    card.innerHTML = '<div class="box-content"><p>No boxes available. Create one to start collaboration.</p></div>';
    list.appendChild(card);
}

function getCapacityCard(boxId) {
    return document.querySelector(`.exist-box-card[data-id="${boxId}"]`);
}

async function editCapacity(boxId) {
    const box = boxes.find((entry) => String(entry.id) === String(boxId));
    if (!box) return;

    const currentCapacity = Number(box.capacity || 1);
    const reservedCount = Number(box.reservedCount || box.memberCount || 0);
    const nextValue = window.prompt(`Set new capacity for ${box.title || 'this box'}`, String(currentCapacity));

    if (nextValue === null) {
        return;
    }

    const parsed = Math.floor(Number(String(nextValue).trim()));
    if (!Number.isFinite(parsed) || parsed < 1) {
        alert('Please enter a valid capacity of at least 1');
        return;
    }

    if (parsed < reservedCount) {
        alert(`Capacity cannot be lower than current members (${reservedCount})`);
        return;
    }

    if (parsed > 200) {
        alert('Capacity cannot exceed 200');
        return;
    }

    if (parsed === currentCapacity) {
        return;
    }

    await apiRequest(`/api/box/update/${boxId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ capacity: parsed })
    });

    await loadBoxes();
}

async function render() {
    const list = document.querySelector('.box-list');
    list.innerHTML = '';

    if (!boxes.length) {
        renderEmptyState(list);
        return;
    }

    for (const box of boxes) {
        const card = document.createElement('div');
        card.className = 'exist-box-card';
        card.dataset.id = box.id;

        const header = document.createElement('div');
        header.className = 'box-header';
        // Show role badges without brackets and only when the role truly applies.
        const roleLabels = [];
        if (String(box.role || '').toLowerCase() === 'admin') {
            roleLabels.push('admin');
        }
        if (box.isMainAdmin) {
            roleLabels.push('main admin');
        }
        const roleLine = roleLabels.join(' | ');
        // Co-admin icon logic (main admin can promote/demote, co-admins can't)
        let coAdminIcon = '';
        // Assume reqUserId is main admin if box.isMainAdmin && box.user_id === reqUserId
        // You may need to adjust this logic based on your backend data structure
        const isMainAdmin = box.isMainAdmin && box.user_id === reqUserId;
        const isSelf = box.user_id === reqUserId;
        if (isMainAdmin && !isSelf) {
            if (box.isCoAdmin) {
                coAdminIcon = `<span class="coadmin-icon" data-action="remove-coadmin" data-id="${box.id}" title="Remove co admin"><i class="fa-solid fa-user-shield"></i></span>`;
            } else {
                coAdminIcon = `<span class="coadmin-icon" data-action="make-coadmin" data-id="${box.id}" title="Add co admin"><i class="fa-regular fa-user-plus"></i></span>`;
            }
        }
        header.innerHTML = `
            <span class="box-title">${box.title}${roleLine ? ` <span class="role-pill">${roleLine}</span>` : ''}</span>
            ${coAdminIcon}
            ${box.adminEmail ? `<div class="box-admin-email">${box.adminEmail}</div>` : ''}
            <div class="actions">
                ${box.role === 'admin' ? `<button class="action-btn danger" data-action="delete" data-id="${box.id}"><i class="fa-solid fa-trash"></i> Delete</button>` : ''}
            </div>
        `;
        card.appendChild(header);

        const content = document.createElement('div');
        content.className = 'box-content';
        content.innerHTML = `<p class="box-description">${box.description || ''}</p>`;

        const metaActions = document.createElement('div');
        metaActions.className = 'box-meta-actions';

        const usedCount = Number(box.reservedCount || box.memberCount || 0);
        const capacityValue = Number(box.capacity || 1);
        const minCapacity = Math.max(usedCount, 1);
        const canEditCapacity = String(box.role || '').toLowerCase() === 'admin';

        const capacityRow = document.createElement('div');
        capacityRow.className = 'item-line capacity-line';
        capacityRow.dataset.capacityRow = box.id;
        capacityRow.innerHTML = `
            <div class="capacity-line-main">
                <strong>Capacity:</strong>
                <span class="capacity-pill" data-capacity-pill="${box.id}">${usedCount}/${capacityValue}</span>
            </div>
            ${canEditCapacity ? `<button type="button" class="capacity-edit-btn" data-action="edit-capacity" data-id="${box.id}" aria-label="Edit capacity" title="Edit capacity"><i class="fa-solid fa-pen"></i></button>` : ''}
        `;
        metaActions.appendChild(capacityRow);

        if (box.role === 'admin') {
            const memberActionRow = document.createElement('div');
            memberActionRow.className = 'item-line member-action-line';
            memberActionRow.innerHTML = `
                <button class="action-chip" data-action="add-member" data-id="${box.id}"><i class="fa-solid fa-user-plus"></i> Add User by Email</button>
            `;
            metaActions.appendChild(memberActionRow);
        }

        content.appendChild(metaActions);

        if (box.id === selectedBoxId) {
            const contents = await loadContents(box.id);

            if (!contents.length) {
                const row = document.createElement('div');
                row.className = 'item-line';
                row.textContent = 'No files/notes/videos in this box.';
                content.appendChild(row);
            }

            if (contents.length) {
                const summary = document.createElement('div');
                summary.className = 'item-line content-row';
                summary.innerHTML = `<span>${contents.length} item${contents.length === 1 ? '' : 's'} uploaded in this box.</span>`;
                content.appendChild(summary);
            }
        }

        card.appendChild(content);
        list.appendChild(card);

        // Add event listeners for co-admin icon
        if (coAdminIcon) {
            const icon = header.querySelector('.coadmin-icon');
            if (icon) {
                icon.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (icon.dataset.action === 'make-coadmin') {
                        // Call API to make co-admin
                        await apiRequest(`/api/box/${box.id}/make-coadmin`, { method: 'POST' });
                        await loadBoxes();
                    } else if (icon.dataset.action === 'remove-coadmin') {
                        // Call API to remove co-admin
                        await apiRequest(`/api/box/${box.id}/remove-coadmin`, { method: 'POST' });
                        await loadBoxes();
                    }
                });
            }
        }
    }
}

async function deleteBox(id) {
    if (!confirm('Delete this box and all its data?')) return;
    await apiRequest(`/api/box/delete/${id}`, { method: 'DELETE' });

    if (selectedBoxId === id) {
        selectedBoxId = null;
    }

    await loadBoxes();
}

async function addMember(boxId) {
    const email = document.getElementById('memberEmailInput').value.trim();
    if (!email) return null;

    return apiRequest(`/api/box/${boxId}/members`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
    });
}

async function removeMember(boxId) {
    const memberUserId = document.getElementById('removeMemberSelect').value;
    if (!memberUserId) return;

    await apiRequest(`/api/box/${boxId}/members/${memberUserId}`, {
        method: 'DELETE'
    });
}

function closeModal() {
    document.getElementById('dashboardModal').setAttribute('aria-hidden', 'true');
    document.getElementById('modalErrorText').textContent = '';
    setModalSection('none');
}

function setModalSection(section) {
    const addForm = document.getElementById('addMemberForm');
    const removeForm = document.getElementById('removeMemberForm');

    addForm.hidden = section !== 'add';
    removeForm.hidden = section !== 'remove';

    addForm.style.display = section === 'add' ? 'grid' : 'none';
    removeForm.style.display = section === 'remove' ? 'grid' : 'none';
}

function openModal(type) {
    const modal = document.getElementById('dashboardModal');
    const title = document.getElementById('modalTitle');
    setModalSection('none');
    document.getElementById('modalErrorText').textContent = '';

    if (type === 'add-member') {
        title.textContent = 'Add User by Email';
        setModalSection('add');
        document.getElementById('memberEmailInput').value = '';
    }

    if (type === 'remove-member') {
        title.textContent = 'Revoke User';
        setModalSection('remove');
    }

    modal.setAttribute('aria-hidden', 'false');
}

async function openRemoveMemberModal(boxId) {
    const members = await loadMembers(boxId);
    const select = document.getElementById('removeMemberSelect');
    select.innerHTML = '';

    const removableMembers = members.filter((member) => String(member.user_id) !== String(reqUserId));

    if (!removableMembers.length) {
        throw new Error('No removable users found in this box');
    }

    removableMembers.forEach((member) => {
        const option = document.createElement('option');
        option.value = member.user_id;
        option.textContent = `${member.email} (${member.role})`;
        select.appendChild(option);
    });

    document.getElementById('removeMemberBoxId').value = boxId;
    openModal('remove-member');
}

document.querySelector('.box-list').addEventListener('click', async (event) => {
    const button = event.target.closest('button[data-action]');

    if (!button) {
        if (event.target.closest('input, textarea, select, label, button, a')) {
            return;
        }

        const card = event.target.closest('.exist-box-card[data-id]');
        if (!card) return;

        const boxId = Number(card.dataset.id);
        if (!Number.isFinite(boxId)) return;

        window.location.href = `/uploads?boxId=${boxId}`;
        return;
    }

    const { action, id } = button.dataset;
    const boxId = Number(id);

    try {
        if (action === 'edit-capacity') {
            await editCapacity(boxId);
            return;
        }

        if (action === 'delete') {
            await deleteBox(boxId);
            return;
        }

        if (action === 'add-member') {
            document.getElementById('addMemberBoxId').value = boxId;
            openModal('add-member');
            return;
        }

        if (action === 'remove-member') {
            await openRemoveMemberModal(boxId);
            return;
        }
    } catch (error) {
        alert(error.message || 'Action failed');
    }
});

document.getElementById('menudashboard').onclick = function() {
    window.location.href = '/dashboard#dashboard';
};

document.getElementById('menuHome').onclick = function() {
    window.location.href = '/home';
};

document.getElementById('newMenu').onclick = function() {
    window.location.href = '/createbox';
};

document.getElementById('newBoxCornerBtn').onclick = function() {
    window.location.href = '/createbox';
};

document.getElementById('menuSettings').onclick = function() {
    window.location.href = '/home?open=settings&return=%2Fdashboard%23dashboard';
};

document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
document.getElementById('dashboardModal').addEventListener('click', (event) => {
    if (event.target.id === 'dashboardModal') {
        closeModal();
    }
});

document.getElementById('addMemberForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const boxId = Number(document.getElementById('addMemberBoxId').value);
    try {
        const result = await addMember(boxId);
        if (result?.message) {
            alert(result.message);
        }
        closeModal();
        await loadBoxes();
    } catch (error) {
        document.getElementById('modalErrorText').textContent = error.message || 'Unable to add user';
    }
});

document.getElementById('removeMemberForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const boxId = Number(document.getElementById('removeMemberBoxId').value);
    try {
        await removeMember(boxId);
        closeModal();
        await loadBoxes();
    } catch (error) {
        document.getElementById('modalErrorText').textContent = error.message || 'Unable to remove user';
    }
});

async function loadSessionUser() {
    const session = await apiRequest('/api/auth/session');
    reqUserId = session.user?.id || null;
}

function activateMenu(menuId) {
    const menus = ['menuHome', 'menudashboard', 'newMenu', 'menuSettings'];
    menus.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('active');
    });
    const current = document.getElementById(menuId);
    if (current) current.classList.add('active');
}

window.addEventListener('load', async () => {
    activateMenu('menudashboard');
    try {
        await loadSessionUser();
        await loadBoxes();
    } catch (error) {
        alert(error.message || 'Unable to load dashboard data');
    }
});
</script>

</body>
</html>
