<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create D-Box</title>
  <link rel="stylesheet" href="style.css">
  <script src="/scripts/auth-guard.js" defer></script>
  <script src="/scripts/back-nav.js" defer></script>
</head>
<body>
  <div class="container create D-Box">
    <h1 class="title">Create your <span class="gradient-text">D-Box</span></h1>

    <div class="Box-card">
      <form id="createBoxForm">
        <label for="gname">Enter Box Name</label>
        <input type="text" id="text" name="text" required>

        <label for="user_paragraph">Enter Box Description</label><br>
        <textarea id="user_paragraph" name="user_paragraph" rows="10" cols="50"></textarea><br><br>
        <!-- <input type="submit" value="Submit"> -->

        <label for="icapacity">Initial Box Capacity</label>
        <input type="number" id="icapacity" name="icapacity" min="1" max="200" required>

        <button type="submit" class="btn primary">Create Box</button>
      </form>

      <p class="muted">Doubtful? <a href="/createbox">Clear form</a></p>
    </div>
  </div>

  <script>
    document.getElementById('createBoxForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const title = document.getElementById('text').value.trim();
      const description = document.getElementById('user_paragraph').value.trim();
      const capacity = Number(document.getElementById('icapacity').value);

      if (!title || !description) {
        alert('Please enter both box name and description.');
        return;
      }

      if (!Number.isFinite(capacity) || capacity < 1) {
        alert('Please choose a valid capacity of at least 1.');
        return;
      }

      try {
        const res = await fetch('/api/box/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ title, description, capacity })
        });

        let data = {};
        const contentType = res.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
          data = await res.json();
        } else {
          const text = await res.text();
          data = { message: text || 'Unexpected server response' };
        }

        if (!res.ok) {
          throw new Error(data.message || data.error || 'Unable to create box');
        }

        window.location.href = '/dashboard#existing';
      } catch (error) {
        alert(error.message || 'Something went wrong while creating box.');
      }
    });
  </script>
</body>
</html>
